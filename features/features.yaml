# Ethora SDK Feature Matrix — source of truth
#
# This file drives the rendered matrices in features/README.md and features/views/.
# See features/README.md for the human-readable output and features/scripts/ for the renderer.
#
# Statuses:
#   present  — fully implemented and working
#   partial  — partially implemented, limited scope, or config-only
#   roadmap  — referenced in code/docs but not yet working
#   absent   — not present
#
# Evidence is a file path (and optional line range) — it's a snapshot from the audit
# date and will drift. Phase 2 will add an automated verifier.

meta:
  version: "26.04"
  last_reviewed: "2026-04-21"
  methodology: >
    Statuses are based on direct code audit (file-level inspection, not just README
    claims). Each feature has a stable ID so it survives renames. "Partial" is used
    when a config / model / stub exists but the end-to-end flow isn't wired.
  next_review: "2026-05-01 (monthly via CI)"

sdks:
  reactjs:
    label: "React.js (Web)"
    repo: "https://github.com/dappros/ethora-chat-component"
    notes: "Flagship SDK, fullest feature coverage. Effectively the JS/TS reference."
    order: 1
  reactnative:
    label: "React Native"
    repo: "https://github.com/dappros/ethora-chat-component-rn"
    notes: "Mobile React Native. Shares architecture with React.js but trails on reactions and notifications."
    order: 2
  android:
    label: "Android (Kotlin)"
    repo: "https://github.com/dappros/ethora-sdk-android"
    notes: "Native Kotlin + Jetpack Compose. JitPack-distributed. No account provisioning APIs."
    order: 3
  swift:
    label: "iOS (Swift)"
    repo: "https://github.com/dappros/ethora-sdk-swift"
    notes: "Native SwiftUI via SPM. Tracks Android closely; no logout helper or dark mode yet."
    order: 4
  wordpress:
    label: "WordPress"
    repo: "https://github.com/dappros/ethora-wp-plugin"
    notes: "Bot-widget plugin, not a full chat SDK. Embeds a single bot-to-user widget."
    order: 5

categories:
  - id: auth
    label: "Authentication"
    order: 1
  - id: messaging
    label: "Messaging"
    order: 2
  - id: media
    label: "Media"
    order: 3
  - id: rooms
    label: "Rooms"
    order: 4
  - id: presence
    label: "Presence & Unread"
    order: 5
  - id: notifications
    label: "Notifications"
    order: 6
  - id: ai
    label: "AI / Bots"
    order: 7
  - id: ui
    label: "UI"
    order: 8
  - id: platform
    label: "Platform"
    order: 9

